name: Deploy docs site

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

# Allow the workflow to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; don't cancel an in-progress publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # Minimal site validation gate (OPS-10): fail fast if the entry point is
      # missing/empty rather than deploying a broken site. Keeps the deploy from
      # publishing an empty artifact when `site/` is accidentally emptied.
      - name: Validate site before deploy
        run: |
          test -s site/index.html || { echo "::error::site/index.html is missing or empty — refusing to deploy."; exit 1; }
          echo "Deploying $(find site -type f | wc -l | tr -d ' ') file(s) from site/."
      # enablement: true turns on Pages (source = GitHub Actions) via the API on
      # the first run, so no manual repo setting is required.
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
