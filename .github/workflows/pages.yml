name: Deploy docs site

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

# Allow the workflow to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; don't cancel an in-progress publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      # Minimal site validation gate (OPS-10): fail fast if the entry point is
      # missing/empty rather than deploying a broken site. Keeps the deploy from
      # publishing an empty artifact when `site/` is accidentally emptied.
      - name: Validate site before deploy
        run: |
          test -s site/index.html || { echo "::error::site/index.html is missing or empty — refusing to deploy."; exit 1; }
          echo "Deploying $(find site -type f | wc -l | tr -d ' ') file(s) from site/."
      # enablement: true turns on Pages (source = GitHub Actions) via the API on
      # the first run, so no manual repo setting is required.
      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
