name: Release

# Publish to npm when a version tag is pushed, e.g. `git tag v0.5.0 && git push --tags`.
# See docs/RELEASING.md for the tag-last release discipline this workflow assumes.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    # A protected deployment environment: required reviewers / wait timers are
    # configured in repo Settings → Environments → "release" (user-assisted).
    environment: release
    permissions:
      contents: read
      # Required for npm provenance / OIDC Trusted Publishing (see the publish step).
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history so the ancestry guard below can compute reachability
          # of the tagged commit from origin/main.
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
          cache: npm
      # OPS-1: refuse to publish a tag whose commit is not reachable from `main`.
      # Tag pushes bypass branch protection, so a tag on an unreviewed/never-CI'd
      # commit must never reach npm. `fetch-depth: 0` above makes the graph complete.
      - name: Verify tagged commit is an ancestor of main
        run: |
          git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::Tag commit $GITHUB_SHA is not reachable from origin/main — refusing to publish."
            exit 1
          fi
      - run: npm ci
      # Guard against publishing a version that doesn't match the tag.
      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag v$TAG does not match package.json version $PKG"
            exit 1
          fi
      # `prepublishOnly` runs the full `check` gate (build + lint + format:check + coverage).
      # `--provenance` requires `id-token: write` (above) and publishes a signed
      # provenance attestation. It works with both a token and OIDC Trusted Publishing.
      - run: npm publish --provenance --access public
        env:
          # OIDC Trusted Publishing is the intended long-term auth path. Keep
          # NODE_AUTH_TOKEN until npmjs.com Trusted Publishing is configured for
          # this repo/workflow — the two changes must land together. DELETE this
          # env AND the NPM_TOKEN secret only AFTER Trusted Publishing is live.
          # See docs/RELEASING.md.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
